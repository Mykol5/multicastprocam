name: Build MultiCast Pro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      # Create fresh Flutter project with our lib folder
      - name: Setup Flutter project
        run: |
          # Backup our custom lib folder
          if [ -d "flutter_app/lib" ]; then
            cp -r flutter_app/lib ./lib_backup
          fi
          
          # Delete existing flutter_app if it exists
          rm -rf flutter_app
          
          # Create fresh Flutter project
          flutter create flutter_app --platforms=android,web
          
          # Restore our custom lib folder
          if [ -d "./lib_backup" ]; then
            rm -rf flutter_app/lib
            mv ./lib_backup flutter_app/lib
          fi
          
          # Replace pubspec.yaml with our correct version
          cat > flutter_app/pubspec.yaml << 'EOF'
name: multicast_pro
description: MultiCast Pro - Cross-platform streaming
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.9.47
  socket_io_client: ^2.0.1
  permission_handler: ^11.0.0
  provider: ^6.1.0
  universal_platform: ^1.0.0+1
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
EOF
          
          cd flutter_app
          flutter pub get
      
      - name: Build Android APK
        working-directory: ./flutter_app
        run: flutter build apk --release
      
      - name: Build Web
        working-directory: ./flutter_app
        run: flutter build web --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: multicast-pro-builds
          path: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
            flutter_app/build/web/
          retention-days: 30
