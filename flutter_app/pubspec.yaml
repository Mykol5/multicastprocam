name: multicast_pro
description: MultiCast Pro - Cross-platform streaming
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebRTC - CORRECTED PACKAGE
  flutter_webrtc: ^0.9.47
  
  # Socket.IO for signaling
  socket_io_client: ^2.0.1
  
  # Permissions
  permission_handler: ^11.0.0
  
  # State management
  provider: ^6.1.0
  
  # Platform detection
  universal_platform: ^1.0.0+1
  
  # UUID for generating unique IDs
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
